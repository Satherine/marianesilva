<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="stylesheet" href="../css/home.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>MSP</title>
  </head>

  <body>
    <div class="divheader">
      <header class="header">
        <a href="index.html" class="logo"
          ><i class="bx bx-disc" id="icon"></i
        ></a>

        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
          <i class="bx bx-menu"></i>
        </button>

        <nav class="navbar" id="mytopnav">
          <a href="sobre.html">Sobre</a>
          <a href="portfolio.html">Portfólio</a>
          <a href="novidades.html">Novidades</a>
          <a href="contato.html">Contato</a>
        </nav>

        <div class="theme-switch" aria-label="Alternar tema">
          <button
            class="theme-btn"
            type="button"
            data-theme-choice="light"
            aria-label="Modo claro"
            title="Modo claro"
          >
            <i class="bx bx-sun"></i>
          </button>
          <button
            class="theme-btn"
            type="button"
            data-theme-choice="dark"
            aria-label="Modo escuro"
            title="Modo escuro"
          >
            <i class="bx bx-moon"></i>
          </button>
          <button
            class="theme-btn"
            type="button"
            data-theme-choice="sistema"
            aria-label="Modo sistema"
            title="Modo sistema"
          >
            <i class="bx bx-desktop"></i>
          </button>
        </div>
      </header>
    </div>

    <div class="container">
      <h1>Oi</h1>
      <p>Seja bem vindo ao meu primeiro site!</p>
      <p>Minimalista <span class="maximalista"> &lpar;por enquanto&rpar;</span>, mas funcional</p>
      <p>Esse é um projeto da faculdade, onde estou aprendendo a criar um site do zero utilizando HTML, CSS e JavaScript.</p>
    </div>

    <div class="ghost-walker" aria-hidden="true">
      <img src="../images/fantasminha.gif" alt="" />
    </div>

    </div>
    <script src="../js/nav.js"></script>
  </body>
</html>
