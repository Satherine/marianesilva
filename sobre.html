<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="stylesheet" href="../css/sobre.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <title>MSP</title>
  </head>

  <body>
    <div class="divheader">
      <header class="header">
        <a href="../index.html" class="logo"
          ><i class="bx bx-disc" id="icon"></i
        ></a>

        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
          <i class="bx bx-menu"></i>
        </button>

        <nav class="navbar" id="mytopnav">
          <a href="sobre.html">Sobre</a>
          <a href="portfolio.html">Portfólio</a>
          <a href="novidades.html">Novidades</a>
          <a href="contato.html">Contato</a>
        </nav>

        <div class="theme-switch" aria-label="Alternar tema">
          <button
            class="theme-btn"
            type="button"
            data-theme-choice="light"
            aria-label="Modo claro"
            title="Modo claro"
          >
            <i class="bx bx-sun"></i>
          </button>
          <button
            class="theme-btn"
            type="button"
            data-theme-choice="dark"
            aria-label="Modo escuro"
            title="Modo escuro"
          >
            <i class="bx bx-moon"></i>
          </button>
          <button
            class="theme-btn"
            type="button"
            data-theme-choice="sistema"
            aria-label="Modo sistema"
            title="Modo sistema"
          >
            <i class="bx bx-desktop"></i>
          </button>
        </div>
      </header>
    </div>

    <main>
      <div>
        <section class="container">
          <h1>Mariane Silva Pereira</h1>
        </section>
      </div>
      <section class="sobre-layout">
        <div class="carousel" aria-label="Carrossel de fotos da Mariane">
          <div class="carousel-track">
            <img
              src="../images/macacometa.jpg"
              alt="Mariane Silva Pereira em pose divertida"
            />
            <img src="../images/Mariane.jpg" alt="Mariane Silva Pereira" />
          </div>
          <button
            class="carousel-btn carousel-btn-prev"
            aria-label="Foto anterior"
            type="button"
          >
            <i class="bx bx-chevron-left"></i>
          </button>
          <button
            class="carousel-btn carousel-btn-next"
            aria-label="Próxima foto"
            type="button"
          >
            <i class="bx bx-chevron-right"></i>
          </button>
          <div class="carousel-dots" aria-label="Indicadores do carrossel">
            <button
              class="carousel-dot active"
              type="button"
              data-slide="0"
              aria-label="Ir para foto 1"
            ></button>
            <button
              class="carousel-dot"
              type="button"
              data-slide="1"
              aria-label="Ir para foto 2"
            ></button>
          </div>
        </div>

        <section class="containersobre">
          <h2>Sobre mim</h2>
          <ul>
            <li>Estudante de Ciências da Computação</li>
            <li>Faço pinturas digitais e em tela</li>
            <li>
              Estudo os seguintes idiomas:
              <div class="idiomas-grid" aria-label="Idiomas estudados">
                <div class="idioma-item">
                  <img
                    class="idioma-flag"
                    src="../images/flag-us.svg"
                    alt="Bandeira dos Estados Unidos"
                  />
                  <span class="idioma-nome">Inglês</span>
                </div>
                <div class="idioma-item">
                  <img
                    class="idioma-flag"
                    src="../images/flag-es.svg"
                    alt="Bandeira da Espanha"
                  />
                  <span class="idioma-nome">Espanhol</span>
                </div>
                <div class="idioma-item">
                  <img
                    class="idioma-flag"
                    src="../images/flag-fr.svg"
                    alt="Bandeira da Franca"
                  />
                  <span class="idioma-nome">Francês</span>
                </div>
                <div class="idioma-item">
                  <img
                    class="idioma-flag"
                    src="../images/flag-ru.svg"
                    alt="Bandeira da Russia"
                  />
                  <span class="idioma-nome">Russo</span>
                </div>
                <div class="idioma-item">
                  <img
                    class="idioma-flag"
                    src="../images/flag-cn.svg"
                    alt="Bandeira da China"
                  />
                  <span class="idioma-nome">Chinês</span>
                </div>
              </div>
            </li>
          </ul>
          <h2>Aprendendo atualmente na faculdade:</h2>
          <div class="skills">
            <div><img src="../images/html-icon.svg" alt="HTML5" /></div>
            <div><img src="../images/css-icon.svg" alt="CSS3" /></div>
            <div>
              <img
                src="../images/javascript-programming-language-icon.svg"
                alt="JavaScript"
              />
            </div>
            <div>
              <img
                src="../images/php-programming-language-icon.svg"
                alt="PHP"
              />
            </div>
            <div><img src="../images/mysql-icon.svg" alt="MySQL" /></div>
          </div>
        </section>
      </section>
    </main>

    <script src="../js/nav.js"></script>
    <script src="../js/sobre.js"></script>
  </body>
</html>
